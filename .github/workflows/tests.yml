name: CI Tests

on:
  push:
    branches:
      - main

jobs:
  test-ai-model:
    name: Test AI Prediction Model
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest joblib pandas scikit-learn imbalanced-learn

      - name: Run Pytest for AI module
        run: pytest nephrosasa-ai/test_model.py -v
