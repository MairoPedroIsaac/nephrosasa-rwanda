databases:
  - name: nephrosasa-db
    databaseName: postgres
    user: postgres
    plan: free

services:
  - type: web
    name: nephrosasa-api
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nephrosasa-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "nephrosasa-api.onrender.com"
      - key: RESEND_API_KEY
        sync: false
